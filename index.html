<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Webdows 10 Concept (Beta)</title>
  <link rel="stylesheet" href="./style.css">
  <link rel="shortcut icon" href="https://raw.githubusercontent.com/B00merang-Artwork/Windows-10/master/48x48/apps/windows.png">
</head>

<body onload="startTime()">
  <div style="padding: 20px;">Webdows 10 Concept <br> by RedEdge967</div>

  <div class="container">
    <!-- Taskbar -->
    <div class="taskbar">
      <div class="icon" id="menuTrigger" onclick="toggleStartMenu()">
        <img src="https://raw.githubusercontent.com/B00merang-Artwork/Windows-10/master/48x48/apps/windows.png" height="32">
      </div>
      <div class="icon" onclick="toggleSearchBox()">
        <img src="https://raw.githubusercontent.com/B00merang-Artwork/Windows-10/master/48x48/apps/search.png" height="32">
      </div>
      <div class="icon right" onclick="hideNotifications()">
        <img src="https://raw.githubusercontent.com/B00merang-Artwork/Windows-10/master/48x48/apps/notification.png" height="32">
      </div>
      <div class="right" id="clock"></div>
      <div class="icon right">
        <img src="https://raw.githubusercontent.com/B00merang-Artwork/Windows-10/master/48x48/apps/network.png" height="32">
      </div>
    </div>

    <!-- Start Menu -->
    <div id="startMenu" class="start" style="display: none;">
      <div class="relative" id="startMenuContent">
        <div class="left-bar-top" id="quickIcons">
          <div class="icon"><img src="https://raw.githubusercontent.com/B00merang-Artwork/Windows-10/master/48x48/apps/user.png" height="32"></div>
          <div class="icon"><img src="https://raw.githubusercontent.com/B00merang-Artwork/Windows-10/master/48x48/apps/computer.png" height="32"></div>
          <div class="icon"><img src="https://raw.githubusercontent.com/B00merang-Artwork/Windows-10/master/48x48/apps/settings.png" height="32"></div>
        </div>
        <div class="left-bar" id="powerIcons">
          <div class="icon"><img src="https://raw.githubusercontent.com/B00merang-Artwork/Windows-10/master/48x48/apps/sleep.png" height="32"></div>
          <div class="icon"><img src="https://raw.githubusercontent.com/B00merang-Artwork/Windows-10/master/48x48/apps/hibernate.png" height="32"></div>
          <div class="icon"><img src="https://raw.githubusercontent.com/B00merang-Artwork/Windows-10/master/48x48/apps/restart.png" height="32"></div>
          <div class="icon"><img src="https://raw.githubusercontent.com/B00merang-Artwork/Windows-10/master/48x48/apps/shutdown.png" height="32"></div>
        </div>

        <div class="list" id="appList"></div>

        <div class="tiles-section" id="tilesSection"></div>
      </div>
    </div>

    <!-- Search Box -->
    <div class="search-box" id="searchBox" style="display: none;">
      <div class="search-bar">
        <input type="text" placeholder="Type here to search" id="searchInput" oninput="filterApps()">
      </div>
      <div class="popular-apps" id="popularApps"></div>
    </div>

    <!-- Notifications -->
    <div class="notifications" style="display: none;" id="notifications">
      <div style="padding: 10px; text-align: center; font-size: 32px;">Notifications</div>
      <div class="notification" id="notify">
        <div style="text-align: center; padding: 10px; border-radius: 5px; background: rgba(0,0,0,0.15); font-size: 20px;">
          <img src="https://raw.githubusercontent.com/B00merang-Artwork/Windows-10/master/48x48/apps/steam.png" height="26" style="vertical-align:middle; float:left;"> Steam
          <div style="float: right;">
            <img src="https://raw.githubusercontent.com/B00merang-Artwork/Windows-10/master/48x48/apps/close.png" height="24" onclick="hideNotify()">
          </div>
        </div>
        <div style="padding: 10px;">
          <img src="https://image.api.playstation.com/vulcan/img/rnd/202009/2913/TQKAd8U6hnIFQIIcz6qnFh8C.png" height="100" style="border-radius:3px; vertical-align:middle;">
          <span style="margin-left:5px;">Game from your wishlist is on sale!</span>
        </div>
      </div>
    </div>
  </div>
</body>

<body>
  <script src="./script.js"></script>
</body>
</html>
